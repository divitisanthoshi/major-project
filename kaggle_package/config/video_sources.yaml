# Curated video sources for training (and optional demo clips)
# Real YouTube URLs from PT/rehab channels (educational). Only use videos you have
# permission to use. See docs/TRAINING_VIDEOS.md for legal note.
#
# When YouTube is not available: add direct video URLs in config/github_sources.yaml
# under direct_downloads, then run with --also-github config/github_sources.yaml
#
# quality: good (→0.85), moderate (→0.55), poor (→0.25)
# Each URL is downloaded as <exercise>_<quality>_<index>.mp4 for video_to_skeleton.py

