# Configuration for Skeleton-Based Rehabilitation Exercise Quality Grading

# Model
model:
  num_joints: 33          # MediaPipe Pose full body
  in_channels: 3          # x, y, z per joint
  num_classes: 1          # continuous correctness score
  num_stgcn_blocks: 4
  stgcn_channels: [64, 64, 128, 256]
  lstm_units: 128
  lstm_layers: 2
  attention_units: 64
  dropout: 0.3

# Sequence / Temporal
sequence:
  frame_buffer_size: 64   # frames per sequence (e.g. ~2s at 30fps)
  stride: 8                # stride when sliding window
  fps: 30

# Pose extraction (MediaPipe). Use 0 for smoother live camera; 1 or 2 for better accuracy.
pose:
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  model_complexity: 0      # 0=lite (faster), 1=full, 2=heavy

# Quality grading
grading:
  score_range: [0.0, 1.0]
  categories:
    good: [0.7, 1.0]
    moderate: [0.4, 0.7]
    poor: [0.0, 0.4]

# Training
training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  validation_split: 0.2
  early_stopping_patience: 15

# Datasets (paths relative to project root or absolute)
datasets:
  ui_prmd_path: "data/ui_prmd"
  kimore_path: "data/kimore"
  ntu_rgbd_path: "data/ntu_rgbd"
  custom_path: "data/custom"

# Real-time / UI. Lower camera size and higher inference_interval = smoother, less lag.
realtime:
  camera_id: 0
  camera_width: 320
  camera_height: 240
  display_width: 960
  display_height: 720
  inference_interval_frames: 4
  default_target_reps: 10

# 15 exercises (UI-PRMD + KIMORE) + 8 custom novel
exercises:
  - deep_squat
  - hurdle_step
  - inline_lunge
  - side_lunge
  - sit_to_stand
  - standing_leg_raise
  - shoulder_abduction
  - shoulder_extension
  - shoulder_rotation
  - shoulder_scaption
  - hip_abduction
  - trunk_rotation
  - squat
  - leg_raise
  - reach_and_retrieve
  - wall_pushup
  - heel_raise
  - bird_dog
  - glute_bridge
  - clamshell
  - chin_tuck
  - marching_in_place
  - step_up
